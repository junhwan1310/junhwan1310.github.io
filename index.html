<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>박준환 Portfolio OS</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at 18% 18%, rgba(56,189,248,.44), transparent 30%),
        radial-gradient(circle at 82% 10%, rgba(168,85,247,.38), transparent 30%),
        radial-gradient(circle at 70% 85%, rgba(34,197,94,.22), transparent 32%),
        linear-gradient(135deg, #0f172a, #1e1b4b 45%, #082f49);
    }

    .desktop {
      position: relative;
      width: 100vw;
      height: calc(100vh - 56px);
      padding: 28px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 104px);
      grid-auto-rows: 116px;
      gap: 18px;
      align-content: start;
    }

    .icon {
      width: 104px;
      text-align: center;
      user-select: none;
      cursor: pointer;
      padding: 10px 6px;
      border-radius: 16px;
      transition: .18s;
    }
    .icon:hover {
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(8px);
      transform: translateY(-2px);
    }
    .icon .emoji {
      font-size: 42px;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.35));
    }
    .icon .label {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.25;
      text-shadow: 0 2px 8px rgba(0,0,0,.65);
      word-break: keep-all;
    }

    .taskbar {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: rgba(15,23,42,.72);
      border-top: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(18px);
      z-index: 9999;
    }
    .start {
      border: 0;
      border-radius: 14px;
      background: rgba(255,255,255,.16);
      color: #fff;
      font-weight: 900;
      padding: 10px 14px;
      cursor: pointer;
    }
    .task {
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.10);
      color: #fff;
      border-radius: 12px;
      padding: 9px 12px;
      cursor: pointer;
      max-width: 180px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .clock {
      margin-left: auto;
      font-size: 13px;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .window {
      position: absolute;
      min-width: 360px;
      min-height: 250px;
      width: 780px;
      height: 540px;
      left: 180px;
      top: 80px;
      border-radius: 18px;
      background: #f8fafc;
      color: #0f172a;
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: 0 28px 80px rgba(0,0,0,.42);
      overflow: hidden;
      resize: both;
      z-index: 10;
    }
    .window.wide {
      width: min(1120px, calc(100vw - 80px));
      height: min(720px, calc(100vh - 110px));
    }
    .window.appview {
      width: min(980px, calc(100vw - 70px));
      height: min(760px, calc(100vh - 100px));
    }
    .titlebar {
      height: 42px;
      background: linear-gradient(90deg, #111827, #1e293b);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 10px 0 14px;
      cursor: move;
      user-select: none;
      gap: 10px;
    }
    .titlebar .title {
      font-size: 14px;
      font-weight: 900;
      flex: 1;
    }
    .winbtn {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 9px;
      color: #fff;
      cursor: pointer;
      background: rgba(255,255,255,.14);
      font-weight: 900;
    }
    .winbtn.close { background: #ef4444; }
    .content {
      height: calc(100% - 42px);
      overflow: auto;
      background: #f8fafc;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: white;
    }

    .page {
      padding: 28px;
      line-height: 1.75;
    }
    .page h1 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -0.03em;
    }
    .page h2 {
      margin: 24px 0 8px;
      font-size: 19px;
    }
    .page p { color: #334155; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: white;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(15,23,42,.08);
    }
    .card h2, .card h3 { margin-top: 0; }
    .tag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 12px;
      font-weight: 900;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    pre {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 14px;
      padding: 16px;
      overflow: auto;
      line-height: 1.55;
    }
    a, .link-btn {
      color: #2563eb;
      font-weight: 900;
      text-decoration: none;
    }


    .erp-page .lead {
      color: #334155;
      max-width: 900px;
      margin-bottom: 14px;
    }
    .erp-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 18px 0;
    }
    .erp-summary-card {
      border: 1px solid #dbeafe;
      background: linear-gradient(180deg, #eff6ff, #ffffff);
      border-radius: 18px;
      padding: 15px;
      box-shadow: 0 10px 24px rgba(15,23,42,.07);
    }
    .erp-summary-card strong {
      display: block;
      color: #1d4ed8;
      font-size: 22px;
      line-height: 1.2;
    }
    .erp-summary-card span {
      color: #475569;
      font-size: 13px;
      font-weight: 800;
    }
    .erp-tabs {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      margin: 18px 0 12px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: rgba(248,250,252,.94);
      backdrop-filter: blur(12px);
    }
    .erp-tab {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 10px 13px;
      background: #ffffff;
      color: #334155;
      font-weight: 900;
      cursor: pointer;
      transition: .16s;
    }
    .erp-tab:hover { transform: translateY(-1px); background: #f1f5f9; }
    .erp-tab.active {
      color: #ffffff;
      border-color: #1d4ed8;
      background: linear-gradient(135deg, #2563eb, #0f766e);
      box-shadow: 0 10px 24px rgba(37,99,235,.22);
    }
    .erp-panel-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin: 12px 0 16px;
    }
    .erp-panel-head h2 { margin: 0 0 4px; }
    .erp-panel-head p { margin: 0; color: #475569; }
    .erp-count {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ecfeff;
      color: #0e7490;
      font-size: 13px;
      font-weight: 900;
      border: 1px solid #a5f3fc;
    }
    .erp-demo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }
    .erp-demo-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 16px 38px rgba(15,23,42,.10);
    }
    .erp-demo-card h3 {
      margin: 0 0 6px;
      font-size: 18px;
      color: #0f172a;
    }
    .erp-demo-card p {
      margin: 0 0 12px;
      color: #475569;
      font-size: 14px;
    }
    .erp-viewer {
      width: 100%;
      overflow: auto;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      padding: 12px;
      text-align: center;
    }
    .erp-viewer img {
      width: auto;
      height: auto;
      max-width: 100%;
      display: inline-block;
      border-radius: 12px;
      background: white;
      box-shadow: 0 12px 26px rgba(15,23,42,.12);
      transform-origin: top center;
    }
    .erp-link-row {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 900;
    }

    .gif-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      margin-top: 18px;
    }
    .gif-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 16px 38px rgba(15,23,42,.10);
    }
    .gif-card h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .gif-viewer {
      width: 100%;
      overflow: auto;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      padding: 14px;
      text-align: center;
    }
    .gif-viewer img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: none;
      display: inline-block;
      border-radius: 12px;
      background: white;
      image-rendering: auto;
      box-shadow: 0 12px 26px rgba(15,23,42,.12);
      transform-origin: top center;
    }
    .shot-caption {
      color: #475569;
      font-size: 13px;
      margin-top: 10px;
      font-weight: 800;
    }

    .notice {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      padding: 14px;
      border-radius: 14px;
      margin-top: 14px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .desktop { padding: 14px; grid-template-columns: repeat(3, 96px); gap: 8px; }
      .window {
        left: 10px !important;
        top: 10px !important;
        width: calc(100vw - 20px) !important;
        height: calc(100vh - 86px) !important;
      }
      .clock { display: none; }
      .task { max-width: 110px; }
      .page { padding: 18px; }
    }

    .project-lead {
      color: #334155;
      max-width: 920px;
      margin-bottom: 14px;
    }
    .project-kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin: 18px 0;
    }
    .project-kpi {
      border: 1px solid #ddd6fe;
      background: linear-gradient(180deg, #f5f3ff, #ffffff);
      border-radius: 18px;
      padding: 15px;
      box-shadow: 0 10px 24px rgba(15,23,42,.07);
    }
    .project-kpi strong {
      display: block;
      color: #5b21b6;
      font-size: 22px;
      line-height: 1.2;
    }
    .project-kpi span {
      color: #475569;
      font-size: 13px;
      font-weight: 800;
    }
    .project-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }
    .project-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      padding: 10px 14px;
      background: #eef2ff;
      color: #4338ca;
      font-weight: 900;
      text-decoration: none;
    }
    .project-action.dark {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
    }
    .project-embed-wrap {
      height: 720px;
      margin-top: 18px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 18px 46px rgba(15,23,42,.12);
    }
    .project-embed-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }
    .project-note {
      padding: 14px 16px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
      font-size: 14px;
      font-weight: 700;
    }

  </style>
</head>
<body>
  <main class="desktop" id="desktop"></main>
  <footer class="taskbar">
    <button class="start" onclick="openApp('about')">Portfolio OS</button>
    <div id="tasks"></div>
    <div class="clock" id="clock"></div>
  </footer>

      {

            "gifs": [
                  {

                  },
                  {

                        "src": "assets/erp/production_instruction_excel_export.gif",

    function initErpProject(scope) {
      const tabs = scope.querySelector("#erpTabs");
      if (!tabs) return;
      tabs.innerHTML = erpCategories.map(cat => `
        <button class="erp-tab" type="button" data-erp-category="${cat.id}">${cat.icon} ${cat.label}</button>
      `).join("");
      tabs.querySelectorAll("[data-erp-category]").forEach(btn => {

    const desktop = document.getElementById("desktop");
    const tasks = document.getElementById("tasks");
    let z = 20;
    let opened = {};

    Object.entries(apps).forEach(([id, app]) => {
      const icon = document.createElement("div");
      icon.className = "icon";
      icon.tabIndex = 0;
      icon.setAttribute("role", "button");
      icon.setAttribute("aria-label", `${app.label} 열기`);
      icon.onclick = () => openApp(id);
      icon.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openApp(id);
        }
      });
      icon.innerHTML = `<div class="emoji">${app.icon}</div><div class="label">${app.label}</div>`;
      desktop.appendChild(icon);
    });

    function openApp(id) {
      if (opened[id]) {
        opened[id].style.display = "block";
        focusWin(opened[id]);
        return;
      }

      const app = apps[id];
      const win = document.createElement("section");
      win.className = "window" + (app.windowClass ? " " + app.windowClass : "");
      win.style.left = (90 + Object.keys(opened).length * 30) + "px";
      win.style.top = (50 + Object.keys(opened).length * 24) + "px";
      win.innerHTML = `
        <div class="titlebar">
          <div class="title">${app.icon} ${app.title}</div>
          <button class="winbtn" title="최소화">—</button>
          <button class="winbtn close" title="닫기">×</button>
        </div>
        <div class="content">${app.iframe ? `<iframe src="${app.iframe}"></iframe>` : app.html}</div>
      `;

      desktop.appendChild(win);
      opened[id] = win;
      focusWin(win);
      makeDraggable(win);
      if (id === "erp") initErpProject(win);

      win.querySelector(".winbtn").onclick = () => win.style.display = "none";
      win.querySelector(".close").onclick = () => {
        win.remove();
        delete opened[id];
        renderTasks();
      };
      win.onmousedown = () => focusWin(win);
      renderTasks();
    }

    function focusWin(win) {
      win.style.zIndex = ++z;
    }

    function makeDraggable(win) {
      const bar = win.querySelector(".titlebar");
      let down = false, ox = 0, oy = 0;
      bar.addEventListener("mousedown", e => {
        if (e.target.tagName === "BUTTON") return;
        down = true;
        ox = e.clientX - win.offsetLeft;
        oy = e.clientY - win.offsetTop;
      });
      document.addEventListener("mousemove", e => {
        if (!down) return;
        win.style.left = Math.max(0, e.clientX - ox) + "px";
        win.style.top = Math.max(0, e.clientY - oy) + "px";
      });
      document.addEventListener("mouseup", () => down = false);
    }

    function renderTasks() {
      tasks.innerHTML = "";
      Object.entries(opened).forEach(([id, win]) => {
        const b = document.createElement("button");
        b.className = "task";
        b.textContent = apps[id].label;
        b.onclick = () => {
          win.style.display = "block";
          focusWin(win);
        };
        tasks.appendChild(b);
      });
    }


    function tick() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleDateString("ko-KR") + " " + now.toLocaleTimeString("ko-KR", {hour:"2-digit", minute:"2-digit"});
    }
    tick();
    setInterval(tick, 1000);
  </script>
